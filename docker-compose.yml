services:
  atlas-backend:
    build:
      context: ./backend
    image: nuclide-atlas-backend:0.2.0
    environment:
      ATLAS_CORS_ORIGINS: "http://localhost:3000"
    # Backend prefers /etc/nuclide-atlas/config/atlas.yaml, falls back to
    # atlas.example.yaml. Both live in this read-write mount so the
    # `/api/discover` endpoint can rewrite atlas.yaml on demand.
    volumes:
      - ./config:/etc/nuclide-atlas/config
    ports:
      - "8000:8000"

  atlas-frontend:
    build:
      context: ./frontend
    image: nuclide-atlas-frontend:0.2.0
    environment:
      API_BASE: "atlas-backend:8000"
    depends_on:
      - atlas-backend
    ports:
      - "3000:3000"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-backend
  namespace: nuclide-atlas
spec:
  replicas: 1
  selector:
    matchLabels: { app: atlas-backend }
  template:
    metadata:
      labels: { app: atlas-backend }
    spec:
      containers:
        - name: backend
          image: nuclide-atlas-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ATLAS_CONFIG
              value: /etc/nuclide-atlas/config.yaml
            - name: ATLAS_CORS_ORIGINS
              value: "http://atlas-frontend:3000"
          volumeMounts:
            - name: config
              mountPath: /etc/nuclide-atlas
              readOnly: true
          readinessProbe:
            httpGet: { path: /api/healthz, port: 8000 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: atlas-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-backend
  namespace: nuclide-atlas
spec:
  selector: { app: atlas-backend }
  ports:
    - port: 8000
      targetPort: 8000

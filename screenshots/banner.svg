<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2db2bf" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#2db2bf" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1c232c" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200"/>
    <path d="M150 0 V320 M300 0 V320 M450 0 V320 M600 0 V320 M750 0 V320 M900 0 V320 M1050 0 V320"/>
  </g>

  <!-- five columns of nodes, suggesting the Atlas layout -->
  <!-- column 1: endpoints -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#d6dee7">
    <g transform="translate(60 110)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#d98b2a" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">api.public</text>
      <text x="10" y="34" fill="#8b97a3">HTTPS · publicAPI</text>
    </g>
    <g transform="translate(60 190)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#d98b2a" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">embed.svc</text>
      <text x="10" y="34" fill="#8b97a3">HTTP · internal</text>
    </g>

    <!-- column 2: deployments -->
    <g transform="translate(260 70)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#38b870" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">d-flagship</text>
      <text x="10" y="34" fill="#8b97a3">vllm · prod</text>
    </g>
    <g transform="translate(260 150)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#38b870" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">d-embed</text>
      <text x="10" y="34" fill="#8b97a3">tgi · prod</text>
    </g>
    <g transform="translate(260 230)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#38b870" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">d-safety</text>
      <text x="10" y="34" fill="#8b97a3">vllm · prod</text>
    </g>

    <!-- column 3: models -->
    <g transform="translate(460 70)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#4f7eff" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">flagship-13b</text>
      <text x="10" y="34" fill="#8b97a3">custom · 32k</text>
    </g>
    <g transform="translate(460 150)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#4f7eff" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">bge-large</text>
      <text x="10" y="34" fill="#8b97a3">embedding</text>
    </g>
    <g transform="translate(460 230)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#4f7eff" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">guardrail-3b</text>
      <text x="10" y="34" fill="#8b97a3">classifier</text>
    </g>

    <!-- column 4: rag + vectors + tools -->
    <g transform="translate(660 70)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#b063e0" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">docs-rag</text>
      <text x="10" y="34" fill="#8b97a3">k=8 · rerank</text>
    </g>
    <g transform="translate(660 150)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#8a6dff" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">corpus-docs-v3</text>
      <text x="10" y="34" fill="#8b97a3">qdrant · 184k</text>
    </g>
    <g transform="translate(660 230)">
      <rect width="120" height="44" rx="6" fill="#1c232c" stroke="#2db2bf" stroke-width="2"/>
      <text x="10" y="18" font-weight="600">search_orders</text>
      <text x="10" y="34" fill="#8b97a3">sqlDb tool</text>
    </g>

    <!-- column 5: agents + safety -->
    <g transform="translate(900 110)">
      <rect width="140" height="48" rx="6" fill="#1c232c" stroke="#d04d6a" stroke-width="2.5" filter="url(#glow)"/>
      <text x="12" y="20" font-weight="700" fill="#fff7c2">support-agent</text>
      <text x="12" y="36" fill="#8b97a3">customer support</text>
    </g>
    <g transform="translate(900 200)">
      <rect width="140" height="44" rx="6" fill="#1c232c" stroke="#c9a02f" stroke-width="2"/>
      <text x="12" y="20" font-weight="600">default-guards</text>
      <text x="12" y="36" fill="#8b97a3">safety policy</text>
    </g>
  </g>

  <!-- edges, suggesting wiring + the highlighted agent path -->
  <g fill="none" stroke="url(#edge)" stroke-width="1.5" opacity="0.7">
    <path d="M180 132 C 220 132, 220 92, 260 92"/>
    <path d="M180 132 C 220 132, 220 172, 260 172"/>
    <path d="M180 212 C 220 212, 220 252, 260 252"/>
    <path d="M380 92 C 420 92, 420 92, 460 92"/>
    <path d="M380 172 C 420 172, 420 172, 460 172"/>
    <path d="M380 252 C 420 252, 420 252, 460 252"/>
    <path d="M580 172 C 620 172, 620 172, 660 172"/>
  </g>

  <!-- highlighted agent-path (yellow) -->
  <g fill="none" stroke="#ffd866" stroke-width="2.2">
    <path d="M900 134 C 800 134, 760 92, 580 92"/>
    <path d="M900 144 C 800 144, 800 92, 780 92"/>
    <path d="M900 152 C 820 152, 820 252, 780 252"/>
    <path d="M900 222 C 820 222, 760 252, 580 252"/>
  </g>

  <!-- wordmark -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <text x="60" y="48" font-size="36" font-weight="700" fill="#d6dee7" letter-spacing="-0.5">
      Nuclide <tspan fill="#2db2bf">Atlas</tspan>
    </text>
    <text x="60" y="72" font-size="13" fill="#8b97a3" letter-spacing="0.04em">
      SEE ANY LLM STACK AS A GRAPH
    </text>
  </g>
</svg>
